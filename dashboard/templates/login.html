<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Vpoker Check in bot Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body {
      background: radial-gradient(ellipse at 30% 40%, #1a0533 0%, #0f0f14 60%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #16162a;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%; max-width: 400px;
      box-shadow: 0 25px 50px rgba(0,0,0,.5);
    }
    .login-logo { font-size: 3rem; }
    .login-title {
      font-size: 1.25rem; font-weight: 700;
      background: linear-gradient(90deg, #a78bfa, #f472b6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .form-control {
      background: #1e1e38; border-color: #2a2a4a; color: #e2e8f0;
    }
    .form-control:focus {
      background: #1e1e38; border-color: #6f42c1; color: #e2e8f0;
      box-shadow: 0 0 0 .2rem rgba(111,66,193,.25);
    }
    .btn-login {
      background: linear-gradient(90deg, #6f42c1, #e91e8c);
      border: none; font-weight: 600; letter-spacing: .03em;
    }
    .btn-login:hover { opacity: .9; }
    .dots { color: #475569; font-size: .75rem; }
    label { font-size: .8rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="login-card text-center">
    <div class="login-logo mb-1">🎰</div>
    <div class="login-title mb-1">Check-in Bot Admin</div>
    <p class="text-muted mb-4" style="font-size:.8rem">Dashboard v1.0</p>

    {% if error %}
    <div class="alert alert-danger py-2 mb-3" style="font-size:.85rem">
      <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="mb-3 text-start">
        <label class="form-label mb-1">Username</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0" style="background:#1e1e38!important;border-color:#2a2a4a">
            <i class="bi bi-person text-muted"></i>
          </span>
          <input type="text" name="username" class="form-control border-start-0"
            placeholder="admin" autocomplete="username" required />
        </div>
      </div>
      <div class="mb-4 text-start">
        <label class="form-label mb-1">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0" style="background:#1e1e38!important;border-color:#2a2a4a">
            <i class="bi bi-lock text-muted"></i>
          </span>
          <input type="password" name="password" id="pwdInput" class="form-control border-start-0"
            placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="input-group-text bg-transparent" style="background:#1e1e38!important;border-color:#2a2a4a;cursor:pointer"
            onclick="var i=document.getElementById('pwdInput');i.type=i.type==='password'?'text':'password'">
            <i class="bi bi-eye text-muted"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-login btn-primary w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <p class="dots mt-4">Default: admin / admin123<br>Change in <code>.env</code> → DASHBOARD_PASSWORD</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
